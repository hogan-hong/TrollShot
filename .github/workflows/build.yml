name: 构建 TrollShot IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FINALPACKAGE: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          brew install ldid-procursus p7zip make dpkg

      - name: 检出 Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: 安装 iOS SDK
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          mkdir -p $THEOS/sdks
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -R /tmp/theos-sdks/iPhoneOS16.5.sdk $THEOS/sdks/
          cp -R /tmp/theos-sdks/iPhoneOS14.5.sdk $THEOS/sdks/
          ls -la $THEOS/sdks/

      - name: 构建应用
        run: |
          set -o pipefail
          export THEOS=$GITHUB_WORKSPACE/theos
          make clean package 2>&1 | tee build.log

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: 打包 IPA
        if: success()
        run: |
          set -x
          echo "=== 查找 .deb 包 ==="
          find . -name "*.deb" -type f
          DEB=$(find . -name "*.deb" -type f | head -n1)
          if [ -z "$DEB" ]; then
            echo "未找到 .deb 包，列出项目目录结构："
            find . -maxdepth 3 -type d | sort
            exit 1
          fi
          echo "DEB=$DEB"

          echo "=== .deb 内容清单 ==="
          dpkg-deb -c "$DEB" | sort

          echo "=== 解包 .deb ==="
          rm -rf extracted Payload TrollShot.ipa
          mkdir -p extracted Payload
          dpkg-deb -R "$DEB" extracted

          echo "=== 解包后目录结构 ==="
          find extracted -maxdepth 8 -type d | sort

          APP_PATH=$(find extracted -name "*.app" -maxdepth 6 -type d | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "未找到 .app 包"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH"

          echo "=== .app 包内容 ==="
          ls -la "$APP_PATH/"

          cp -R "$APP_PATH" Payload/
          APP_NAME=$(basename "$APP_PATH")
          echo "APP_NAME=$APP_NAME"

          echo "=== Payload 内容 ==="
          ls -la Payload/
          ls -la "Payload/$APP_NAME/"

          # 确保 Info.plist 存在
          if [ ! -f "Payload/$APP_NAME/Info.plist" ]; then
            echo "Info.plist 不在 .app 中，从项目根复制"
            cp Info.plist "Payload/$APP_NAME/Info.plist"
          fi

          # 确保主可执行文件
          EXEC_NAME=$(/usr/libexec/PlistBuddy -c "Print CFBundleExecutable" "Payload/$APP_NAME/Info.plist" 2>/dev/null || echo "TrollShot")
          echo "EXEC_NAME=$EXEC_NAME"
          if [ -f "Payload/$APP_NAME/$EXEC_NAME" ]; then
            chmod +x "Payload/$APP_NAME/$EXEC_NAME"
          else
            echo "警告：未找到可执行文件 Payload/$APP_NAME/$EXEC_NAME"
          fi

          # 确保 trollshotd 和 launchd plist 在 .app 中
          if [ ! -f "Payload/$APP_NAME/trollshotd" ]; then
            STAGED_BIN=$(find extracted -name "trollshotd" -type f | head -n1)
            echo "尝试从 extracted 查找 trollshotd: $STAGED_BIN"
            if [ -n "$STAGED_BIN" ]; then
              cp -p "$STAGED_BIN" "Payload/$APP_NAME/trollshotd"
            fi
          fi
          if [ ! -f "Payload/$APP_NAME/com.hogan.trollshot.plist" ]; then
            STAGED_PLIST=$(find extracted -name "com.hogan.trollshot.plist" -type f | head -n1)
            echo "尝试从 extracted 查找 plist: $STAGED_PLIST"
            if [ -n "$STAGED_PLIST" ]; then
              cp -p "$STAGED_PLIST" "Payload/$APP_NAME/com.hogan.trollshot.plist"
            fi
          fi

          if [ ! -f "Payload/$APP_NAME/trollshotd" ]; then
            echo "错误：未找到 Payload/$APP_NAME/trollshotd"
            exit 1
          fi
          if [ ! -f "Payload/$APP_NAME/com.hogan.trollshot.plist" ]; then
            echo "错误：未找到 Payload/$APP_NAME/com.hogan.trollshot.plist"
            exit 1
          fi
          chmod +x "Payload/$APP_NAME/trollshotd"

          find . -name ".DS_Store" -delete
          zip -r TrollShot.ipa Payload
          ls -lh TrollShot.ipa

          echo "=== IPA 内容 ==="
          unzip -l TrollShot.ipa

      - name: 上传打包调试信息
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-debug
          path: extracted
          if-no-files-found: ignore

      - name: 上传 IPA 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: TrollShot-IPA
          path: TrollShot.ipa
          if-no-files-found: error
