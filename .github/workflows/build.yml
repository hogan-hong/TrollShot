name: 构建 TrollShot

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FINALPACKAGE: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          brew install ldid-procursus p7zip make dpkg

      - name: 检出 Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: 安装 iOS SDK
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          mkdir -p $THEOS/sdks
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -R /tmp/theos-sdks/iPhoneOS16.5.sdk $THEOS/sdks/
          cp -R /tmp/theos-sdks/iPhoneOS14.5.sdk $THEOS/sdks/
          ls -la $THEOS/sdks/

      - name: 构建应用
        run: |
          set -o pipefail
          export THEOS=$GITHUB_WORKSPACE/theos
          make clean package 2>&1 | tee build.log

          echo "=== 检查 staging .app 中的 daemon 和 plist ==="
          ls -la .theos/_/Applications/TrollShot.app/ || true

          echo "=== 检查 .deb 中的关键文件 ==="
          dpkg-deb -c packages/com.example.trollshot_*.deb | grep -E "trollshotd|\.plist" || true

      - name: 打包 IPA
        run: |
          set -e
          # 从 staging 目录拿出 .app，按 TrollStore 标准打包成 Payload/*.app
          mkdir -p Payload
          cp -R .theos/_/Applications/TrollShot.app Payload/
          # TrollStore 安装时需要可执行权限
          chmod -R +x Payload/TrollShot.app
          zip -yqr TrollShot.ipa Payload
          rm -rf Payload
          ls -lh TrollShot.ipa

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: 上传 IPA 构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TrollShot-ipa
          path: TrollShot.ipa
          if-no-files-found: error

      - name: 上传解包调试信息
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-debug
          path: .theos/_
          if-no-files-found: ignore
