name: 构建 TrollShot IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FINALPACKAGE: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          brew install ldid-procursus p7zip make

      - name: 检出 Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      - name: 安装 iOS SDK
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          cd theos
          ./bin/install-sdk iPhoneOS14.5
          ./bin/install-sdk iPhoneOS16.5

      - name: 构建应用
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          make clean package

      - name: 打包 IPA
        run: |
          mkdir -p extracted Payload
          dpkg-deb -R packages/*.deb extracted
          APP_PATH=$(find extracted -name "*.app" -type d | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "未找到 .app 包"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          cd Payload
          find . -name ".DS_Store" -delete
          cd ..
          zip -r TrollShot.ipa Payload
          ls -lh TrollShot.ipa

      - name: 上传 IPA 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: TrollShot-IPA
          path: TrollShot.ipa
          if-no-files-found: error
